{% extends 'layout.html' %}

{% block title %} Weight {% endblock %}

{% block content %}

<h2>Weight Converter</h2>

<form action="/weight" method="POST" class="units-form">
    <input type="number" name="weight" placeholder="Enter the weight..." class="unit-value-input" required>

    <select name="convert-from" id="convert-from" class="select-unit-input" required>
        <option value="">-- Convert From --</option>
        <option value="ounce">Ounce</option>
        <option value="pound">Pound</option>
        <option value="us-ton">US Ton</option>
        <option value="milligram">Milligram</option>
        <option value="gram">Gram</option>
        <option value="kilogram">Kilogram</option>
        <option value="tonne">Tonne</option>
    </select>

    <select name="convert-to" id="convert-to" class="select-unit-input" required>
        <option value="">-- Convert To --</option>
        <option value="ounce">Ounce</option>
        <option value="pound">Pound</option>
        <option value="us-ton">US Ton</option>
        <option value="milligram">Milligram</option>
        <option value="gram">Gram</option>
        <option value="kilogram">Kilogram</option>
        <option value="tonne">Tonne</option>
    </select>

    <button type="submit" class="submit-button">Convert :D</button>
</form>

{% if result is not none %}
<div class="result-container">
    <p class="result">Result: {{ result }}</p>
</div>
{% endif %}

{% endblock %}
