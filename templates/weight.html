{% extends 'layout.html' %}

{% block title %} Weight {% endblock %}

{% block content %}

<h2>Weight Converter</h2>

<form action="/weight" method="POST">
    <label for="weight">Enter the weight</label>
    <input type="number" name="weight" required>

    <label for="convert-from">Convert from</label>
    <select name="convert-from" id="convert-from" required>
        <option value="">--Choose a unit--</option>
        <option value="ounce">Ounce</option>
        <option value="pound">Pound</option>
        <option value="us-ton">US Ton</option>
        <option value="milligram">Milligram</option>
        <option value="gram">Gram</option>
        <option value="kilogram">Kilogram</option>
        <option value="tonne">Tonne</option>
    </select>

    <label for="convert-to">Convert to</label>
    <select name="convert-to" id="convert-to" required>
        <option value="">--Choose a unit--</option>
        <option value="ounce">Ounce</option>
        <option value="pound">Pound</option>
        <option value="us-ton">US Ton</option>
        <option value="milligram">Milligram</option>
        <option value="gram">Gram</option>
        <option value="kilogram">Kilogram</option>
        <option value="tonne">Tonne</option>
    </select>

    <button type="submit">Convert :D</button>
</form>

{% if result is not none %}
<p>Result: {{ result }}</p>
{% endif %}

{% endblock %}
